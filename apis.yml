  - type: Features
    data:
      - name: WestCX Orchestrate
        description: >-
          AI-native platform coordinating customer interactions across voice, SMS,
          RCS, chat, and email channels with intelligent routing and automation.
      - name: WestCX Engage
        description: >-
          Real-time AI engagement platform combining LinguaAI, journey orchestration,
          and Insights360 analytics into a unified patient interaction ecosystem.
      - name: WestCX Outreach
        description: >-
          Proactive outreach automation delivering personalized voice, SMS, email,
          and RCS messages for appointment reminders, health campaigns, and alerts.
      - name: Insights360
        description: >-
          End-to-end call analytics solution providing real-time monitoring,
          conversation intelligence, and performance reporting across all channels.
      - name: Conversational AI
        description: >-
          Natural language processing and machine learning models enabling
          human-like automated interactions across voice and digital channels.
      - name: RCS Messaging
        description: >-
          Rich Communication Services messaging with branded sender identities,
          rich media, interactive actions, and Twilio-powered global delivery.
  - type: UseCases
    data:
      - name: Patient Appointment Management
        description: >-
          Automated appointment reminders, confirmations, and scheduling for
          healthcare providers reducing no-shows and improving patient adherence.
      - name: Pharmacy Engagement
        description: >-
          Agentic AI solutions for pharmacy operations including prescription
          notifications, refill reminders, and medication adherence programs.
      - name: Healthcare Payer Outreach
        description: >-
          Member engagement campaigns for preventive care, benefits information,
          and care gap closure for health insurance organizations.
      - name: Enterprise Customer Service
        description: >-
          Conversational AI automation for enterprise contact centers handling
          high-volume inquiries across voice, chat, and messaging channels.
      - name: Life Sciences Communication
        description: >-
          Patient recruitment, clinical trial communication, and post-market
          surveillance outreach for pharmaceutical and medical device companies.
  - type: Integrations
    data:
      - name: Genesys
        description: >-
          Contact center platform integration enabling seamless AI-assisted
          agent workflows and omnichannel routing.
      - name: Amazon Connect
        description: >-
          AWS contact center integration for cloud-native customer engagement
          and intelligent virtual agent deployments.
      - name: Five9
        description: >-
          Cloud contact center integration for unified customer experience
          management across voice and digital channels.
      - name: Twilio
        description: >-
          Global messaging infrastructure partnership powering RCS, SMS, and
          voice communication delivery at enterprise scale.
      - name: Fiserv
        description: >-
          Financial services platform integration for banking and fintech
          customer notification and engagement workflows.
      - name: Jack Henry
        description: >-
          Community banking platform integration for account alerts, servicing
          notifications, and member communication.
