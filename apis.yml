name: West Technology Group
description: >-
  West Technology Group is a cloud-based global technology company providing
  customer experience and communications solutions through its WestCX platform.
  The company operates through two main brands: Mosaicx, which delivers AI-native
  conversational automation for enterprise customer engagement, and TeleVox, which
  provides digital patient engagement solutions for healthcare organizations including
  providers, payers, and life sciences companies.
